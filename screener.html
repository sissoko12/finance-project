<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financial Screener</title>
<style>
  :root{
    --bg:#f3f4f6; --panel:#ffffff; --border:#e5e7eb; --text:#111827; --muted:#6b7280;
    --navy:#1d4ed8; --green:#16a34a; --red:#dc2626; --amber:#d97706; --purple:#7c3aed;
    --hover:#eff6ff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);color:var(--text);font-size:13px;
    font-family:Inter,"Segoe UI",system-ui,-apple-system,sans-serif;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:#d0d3db;border-radius:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  a{color:var(--navy);text-decoration:none;cursor:pointer;}

  .app{display:flex;height:100vh;overflow:hidden;}

  /* ============ SIDEBAR ============ */
  .sidebar{width:260px;min-width:260px;background:var(--panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;height:100vh;}
  .sb-scroll{flex:1;overflow-y:auto;padding:12px 12px 0;}
  .sb-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .sb-head .title{font-size:13px;font-weight:700;}
  .sb-head .cnt{background:var(--navy);color:#fff;border-radius:10px;font-size:11px;font-weight:600;
    padding:1px 7px;display:none;}
  .sb-head .clear{margin-left:auto;font-size:12px;}
  .sb-sec{margin-bottom:16px;}
  .sb-sec>h4{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    margin:0 0 8px;font-weight:700;}

  /* saved screens */
  .saved-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
  .saved-item{display:flex;align-items:center;gap:6px;background:#f9fafb;border:1px solid var(--border);
    border-radius:6px;padding:6px 8px;font-size:12px;cursor:pointer;}
  .saved-item:hover{background:var(--hover);}
  .saved-item .nm{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .saved-item .n{color:var(--muted);}
  .saved-item .del{color:var(--muted);font-weight:700;padding:0 2px;}
  .saved-item .del:hover{color:var(--red);}
  .saved-empty{color:var(--muted);font-size:12px;font-style:italic;margin-bottom:8px;}
  .saved-row{display:flex;gap:6px;}
  .saved-row input{flex:1;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;}
  .saved-row input:focus{outline:none;border-color:var(--navy);}
  .btn{border:1px solid var(--border);background:#fff;border-radius:6px;padding:6px 10px;font-size:12px;
    cursor:pointer;color:var(--text);}
  .btn:hover{background:#f3f4f6;}
  .btn.navy{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600;}
  .btn.navy:hover{filter:brightness(1.08);background:var(--navy);}

  /* presets */
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .preset{border:1px solid var(--border);background:#fff;border-radius:6px;padding:8px;font-size:12px;
    cursor:pointer;text-align:left;line-height:1.3;}
  .preset:hover{border-color:var(--navy);background:var(--hover);}
  .preset b{display:block;font-weight:600;margin-bottom:2px;}
  .preset span{color:var(--muted);font-size:11px;}
  .preset.active{border-color:var(--navy);background:var(--hover);}

  /* sector tiles */
  .sector-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .sec-tile{border:1px solid var(--border);background:#fff;border-radius:6px;padding:6px 8px;font-size:11px;
    cursor:pointer;line-height:1.25;}
  .sec-tile:hover{border-color:var(--navy);background:var(--hover);}
  .sec-tile.active{border-color:var(--navy);background:var(--navy);color:#fff;}
  .sec-tile .sn{font-weight:600;display:block;}
  .sec-tile .sc{opacity:.75;}
  .subind{margin-top:8px;max-height:180px;overflow-y:auto;border:1px solid var(--border);
    border-radius:6px;padding:6px;}
  .subind label{display:flex;align-items:center;gap:6px;padding:3px 2px;font-size:12px;cursor:pointer;}
  .subind label:hover{background:var(--hover);}
  .subind .sc{margin-left:auto;color:var(--muted);}

  /* market cap slider */
  .slider-wrap{padding:4px 2px;}
  .range-val{font-weight:600;margin-bottom:10px;font-size:13px;}
  .dual{position:relative;height:30px;}
  .dual input[type=range]{position:absolute;width:100%;top:8px;margin:0;pointer-events:none;
    -webkit-appearance:none;background:none;height:4px;}
  .dual input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:all;
    width:15px;height:15px;border-radius:50%;background:var(--navy);border:2px solid #fff;
    box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:pointer;}
  .dual .track{position:absolute;top:9px;left:0;right:0;height:4px;background:#e5e7eb;border-radius:2px;}
  .dual .track .fill{position:absolute;height:100%;background:var(--navy);border-radius:2px;}
  .cap-ticks{display:flex;justify-content:space-between;color:var(--muted);font-size:10px;margin-top:2px;}

  /* eps pills */
  .pills{display:flex;flex-wrap:wrap;gap:5px;}
  .pill{border:1px solid var(--border);background:#fff;border-radius:14px;padding:4px 10px;font-size:11px;
    cursor:pointer;font-weight:600;position:relative;}
  .pill[data-sig=ALL]{color:var(--text);}
  .pill.on{color:#fff;}
  .pill.on[data-sig=NORMAL]{background:var(--navy);border-color:var(--navy);}
  .pill.on[data-sig=TURNAROUND]{background:var(--green);border-color:var(--green);}
  .pill.on[data-sig=IMPROVING]{background:var(--purple);border-color:var(--purple);}
  .pill.on[data-sig=DETERIORATING]{background:var(--amber);border-color:var(--amber);}
  .pill.on[data-sig=DEEPENING]{background:var(--red);border-color:var(--red);}
  .pill.on[data-sig=ALL]{background:var(--navy);border-color:var(--navy);color:#fff;}

  /* avg toggles */
  .toggle-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;}
  .toggle-row .avg{margin-left:auto;color:var(--muted);font-size:11px;}
  .sw{position:relative;width:32px;height:18px;background:#d1d5db;border-radius:10px;cursor:pointer;
    transition:background .15s;flex:none;}
  .sw.on{background:var(--navy);}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;background:#fff;
    border-radius:50%;transition:left .15s;}
  .sw.on::after{left:16px;}

  .sb-foot{padding:10px 12px;border-top:1px solid var(--border);}
  .sb-foot .btn{width:100%;padding:9px;}

  /* ============ MAIN ============ */
  .main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);
    border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .toolbar .count{font-size:14px;}
  .toolbar .count b{color:var(--navy);font-weight:700;}
  .toolbar .spacer{flex:1;}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .seg button{border:none;background:#fff;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--muted);
    border-right:1px solid var(--border);}
  .seg button:last-child{border-right:none;}
  .seg button.on{background:var(--navy);color:#fff;font-weight:600;}
  .tbtn{border:1px solid var(--border);background:#fff;border-radius:6px;padding:6px 11px;font-size:12px;
    cursor:pointer;color:var(--text);position:relative;}
  .tbtn:hover{background:#f3f4f6;}
  .tbtn.on{background:var(--navy);color:#fff;border-color:var(--navy);}

  .col-menu{position:absolute;top:36px;right:0;width:220px;background:#fff;border:1px solid var(--border);
    border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:600;padding:8px;display:none;
    max-height:360px;overflow-y:auto;}
  .col-menu label{display:flex;align-items:center;gap:7px;padding:5px 4px;font-size:12px;cursor:pointer;}
  .col-menu label:hover{background:var(--hover);}

  /* filter chips */
  .chips-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--panel);
    border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .fchip{display:inline-flex;align-items:center;gap:6px;background:var(--hover);border:1px solid #bfdbfe;
    color:var(--navy);border-radius:14px;padding:3px 10px;font-size:12px;font-weight:600;}
  .fchip .x{cursor:pointer;font-weight:700;}
  .chips-bar .clear{margin-left:auto;font-size:12px;}

  /* sector distribution bar */
  .dist{padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);}
  .dist-bar{display:flex;height:14px;border-radius:4px;overflow:hidden;margin-bottom:6px;}
  .dist-bar .seg-d{height:100%;cursor:pointer;}
  .dist-bar .seg-d:hover{opacity:.8;}
  .dist-legend{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:11px;color:var(--muted);}
  .dist-legend .li{display:inline-flex;align-items:center;gap:4px;cursor:pointer;}
  .dist-legend .dot{width:8px;height:8px;border-radius:2px;}

  /* stats bar */
  .stats-bar{display:none;align-items:center;gap:18px;padding:8px 16px;background:#fffbeb;
    border-bottom:1px solid #fde68a;font-size:12px;}
  .stats-bar b{color:var(--navy);}
  .stats-bar .x{margin-left:auto;cursor:pointer;color:var(--muted);font-weight:700;}

  .view-wrap{flex:1;overflow:auto;position:relative;}

  /* ============ TABLE ============ */
  table.grid{width:100%;border-collapse:collapse;font-size:12px;background:#fff;}
  table.grid th,table.grid td{padding:0 8px;height:32px;text-align:right;border-bottom:1px solid var(--border);
    white-space:nowrap;}
  table.grid th{position:sticky;top:0;background:#f9fafb;z-index:2;font-weight:600;color:var(--muted);
    user-select:none;}
  table.grid th.l,table.grid td.l{text-align:left;}
  table.grid td.tk a{font-weight:600;}
  table.grid tbody tr:hover td{background:var(--hover);}
  .th-in{display:flex;align-items:center;gap:4px;justify-content:flex-end;}
  th.l .th-in{justify-content:flex-start;}
  .th-in .lbl{cursor:pointer;}
  .th-in .fbtn{cursor:pointer;color:#9ca3af;font-size:10px;border:1px solid transparent;border-radius:3px;
    padding:0 2px;}
  .th-in .fbtn:hover{background:#e5e7eb;}
  .th-in .fbtn.on{color:var(--navy);background:var(--hover);border-color:#bfdbfe;}

  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;}
  .b-NORMAL{background:var(--navy);}
  .b-TURNAROUND{background:var(--green);}
  .b-IMPROVING{background:var(--purple);}
  .b-DETERIORATING{background:var(--amber);}
  .b-DEEPENING{background:var(--red);}
  .pctpill{display:inline-block;margin-left:5px;background:#f3f4f6;color:var(--muted);border-radius:8px;
    padding:0 5px;font-size:9px;font-weight:600;vertical-align:middle;}

  /* excel filter dropdown */
  .xfilter{position:fixed;width:260px;background:#fff;border:1px solid var(--border);border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:500;padding:8px;display:none;font-weight:400;}
  .xfilter .sortrow{display:flex;gap:6px;margin-bottom:8px;}
  .xfilter .sortrow .btn{flex:1;font-size:11px;padding:5px;}
  .xfilter .cond{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;}
  .xfilter .cond:focus{outline:none;border-color:var(--navy);}
  .xfilter .hint{color:var(--muted);font-size:10px;margin:3px 0 8px;}
  .xfilter .srch{width:100%;border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;
    margin-bottom:6px;}
  .xfilter .vals{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:4px;}
  .xfilter .vals label{display:flex;align-items:center;gap:6px;padding:3px 4px;font-size:12px;cursor:pointer;}
  .xfilter .vals label:hover{background:var(--hover);}
  .xfilter .foot{display:flex;gap:6px;margin-top:8px;}
  .xfilter .foot .btn{flex:1;}

  /* pagination */
  .pager{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--panel);
    border-top:1px solid var(--border);font-size:12px;}
  .pager select{border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;}
  .pager .btn{padding:5px 9px;}
  .pager .info{color:var(--muted);}
  .pager .spacer{flex:1;}

  /* scatter / analysis */
  .plot-controls{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-wrap:wrap;
    background:var(--panel);border-bottom:1px solid var(--border);}
  .plot-controls select{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;}
  .plot-controls label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;}
  .canvas-wrap{position:relative;padding:12px 16px;}
  canvas{background:#fff;border:1px solid var(--border);border-radius:8px;}
  #plotTip,#anaTip{position:fixed;display:none;background:#1a1f2e;color:#fff;padding:6px 9px;border-radius:6px;
    font-size:11px;pointer-events:none;z-index:800;line-height:1.4;box-shadow:0 4px 12px rgba(0,0,0,.3);}

  .ana{display:flex;height:100%;overflow:hidden;}
  .ana-left{flex:1;display:flex;flex-direction:column;overflow:auto;}
  .stat-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px 16px;}
  .stat-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;}
  .stat-card .t{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:700;}
  .stat-card .v{font-size:18px;font-weight:700;margin-top:4px;}
  .stat-card .m{font-size:11px;color:var(--muted);margin-top:2px;}
  .ana-right{width:400px;min-width:400px;border-left:1px solid var(--border);overflow-y:auto;background:#fff;}
  .ana-right table{width:100%;border-collapse:collapse;font-size:11px;}
  .ana-right th,.ana-right td{padding:5px 8px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
  .ana-right th{position:sticky;top:0;background:#f9fafb;color:var(--muted);font-weight:600;}
  .ana-right td.l,.ana-right th.l{text-align:left;}
  .ana-right tr.avg td{background:#fef3c7;font-weight:700;}
  .ana-right tr.med td{background:#dbeafe;font-weight:700;}
  .up{color:var(--green);} .down{color:var(--red);}

  /* peek panel */
  .peek{position:fixed;top:0;right:-360px;width:340px;height:100vh;background:#fff;
    border-left:1px solid var(--border);box-shadow:-8px 0 24px rgba(0,0,0,.12);z-index:900;
    transition:right .25s ease;padding:20px;overflow-y:auto;}
  .peek.open{right:0;}
  .peek .pk-close{position:absolute;top:14px;right:16px;font-size:18px;color:var(--muted);cursor:pointer;}
  .peek .pk-tk{font-size:22px;font-weight:700;}
  .peek .pk-nm{color:var(--muted);font-size:13px;margin-bottom:18px;}
  .peek-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .peek-grid .pg{border:1px solid var(--border);border-radius:8px;padding:10px;}
  .peek-grid .pg .k{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .peek-grid .pg .val{font-size:16px;font-weight:600;margin-top:4px;}

  /* toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#1a1f2e;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;
    pointer-events:none;transition:all .2s;z-index:1000;box-shadow:0 6px 20px rgba(0,0,0,.3);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .tooltip{position:relative;}
  .banner{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:6px 16px;font-size:12px;}
  .loading{padding:40px;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<div id="dataBanner" class="banner" style="display:none"></div>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sb-scroll">
      <div class="sb-head">
        <span class="title">Screener</span>
        <span class="cnt" id="filterCount">0</span>
        <a class="clear" id="clearAll">Clear all</a>
      </div>

      <div class="sb-sec">
        <h4>Saved Screens</h4>
        <div class="saved-list" id="savedList"></div>
        <div class="saved-row">
          <input id="saveName" placeholder="Name this screen…" />
          <button class="btn" id="saveBtn">Save</button>
        </div>
      </div>

      <div class="sb-sec">
        <h4>Quick Presets</h4>
        <div class="preset-grid" id="presetGrid">
          <button class="preset" data-preset="quality"><b>Quality</b><span>Stable EPS + high margin</span></button>
          <button class="preset" data-preset="growth"><b>High Growth</b><span>EPS &amp; sales &gt; avg</span></button>
          <button class="preset" data-preset="turnaround"><b>Turnaround</b><span>Turnaround / improving</span></button>
          <button class="preset" data-preset="nodebt"><b>No LT Debt</b><span>Zero long-term debt</span></button>
        </div>
      </div>

      <div class="sb-sec">
        <h4>Sector</h4>
        <div class="sector-grid" id="sectorGrid"></div>
        <div class="subind" id="subInd" style="display:none"></div>
      </div>

      <div class="sb-sec">
        <h4>Market Cap</h4>
        <div class="slider-wrap">
          <div class="range-val" id="capLabel">$0B — $0B</div>
          <div class="dual">
            <div class="track"><div class="fill" id="capFill"></div></div>
            <input type="range" id="capMin" min="0" max="100" value="0" />
            <input type="range" id="capMax" min="0" max="100" value="100" />
          </div>
          <div class="cap-ticks"><span>Micro</span><span>Small</span><span>Mid</span><span>Large</span><span>Mega</span></div>
        </div>
      </div>

      <div class="sb-sec">
        <h4>EPS Signal (F0→F1)</h4>
        <div class="pills" id="sigPills"></div>
      </div>

      <div class="sb-sec">
        <h4>Above Sector Average</h4>
        <div class="toggle-row"><div class="sw" data-avg="eps"></div><span>EPS Growth</span><span class="avg" id="avgEps"></span></div>
        <div class="toggle-row"><div class="sw" data-avg="ebitda"></div><span>EBITDA Margin</span><span class="avg" id="avgEbitda"></span></div>
        <div class="toggle-row"><div class="sw" data-avg="sales"></div><span>Sales Growth</span><span class="avg" id="avgSales"></span></div>
        <div class="toggle-row"><div class="sw" data-avg="pe"></div><span>P/E below avg</span><span class="avg" id="avgPe"></span></div>
      </div>
    </div>
    <div class="sb-foot">
      <button class="btn navy" id="applyBtn">Apply Filters</button>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="toolbar">
      <div class="count"><b id="fCount">0</b> of <span id="tCount">0</span> companies</div>
      <div class="spacer"></div>
      <button class="tbtn" id="heatBtn">Heatmap</button>
      <button class="tbtn" id="pctBtn">% Percentile</button>
      <div class="seg" id="viewSeg">
        <button data-view="table" class="on">Table</button>
        <button data-view="scatter">Scatter</button>
        <button data-view="analysis">Analysis</button>
      </div>
      <div style="position:relative">
        <button class="tbtn" id="colBtn">Columns ▾</button>
        <div class="col-menu" id="colMenu"></div>
      </div>
      <button class="tbtn" id="exportBtn">Export CSV</button>
    </div>

    <div class="chips-bar" id="chipsBar" style="display:none"></div>

    <div class="dist" id="distWrap">
      <div class="dist-bar" id="distBar"></div>
      <div class="dist-legend" id="distLegend"></div>
    </div>

    <div class="stats-bar" id="statsBar">
      <span id="statsTitle"></span>
      <span>Min <b id="stMin"></b></span>
      <span>Max <b id="stMax"></b></span>
      <span>Mean <b id="stMean"></b></span>
      <span>Median <b id="stMed"></b></span>
      <span>Std <b id="stStd"></b></span>
      <span class="x" id="statsClose">×</span>
    </div>

    <div class="view-wrap" id="viewWrap">
      <div class="loading" id="loading">Loading data…</div>
    </div>

    <div class="pager" id="pager" style="display:none">
      <span>Rows</span>
      <select id="perPage"><option>25</option><option selected>50</option><option>100</option></select>
      <span class="info" id="pageInfo"></span>
      <div class="spacer"></div>
      <button class="btn" id="pgFirst">« First</button>
      <button class="btn" id="pgPrev">‹ Prev</button>
      <button class="btn" id="pgNext">Next ›</button>
      <button class="btn" id="pgLast">Last »</button>
    </div>
  </div>
</div>

<!-- excel filter dropdown (single, reused) -->
<div class="xfilter" id="xfilter"></div>

<!-- peek panel -->
<div class="peek" id="peek">
  <span class="pk-close" id="peekClose">×</span>
  <div class="pk-tk" id="pkTk"></div>

function epsCalc(a, b){
  // returns {gr, sig} for direction a->b (F0->F1 or F1->F2)
  if(a==null||b==null||isNaN(a)||isNaN(b)) return {gr:null,sig:null};
  if(a<0 && b>0)  return {gr:99,  sig:"TURNAROUND"};   // sentinel +99
  if(a<0 && b<=a) return {gr:-99, sig:"DEEPENING"};    // sentinel -99
  if(a<0 && b>a)  return {gr:(b-a)/Math.abs(a)*100, sig:"IMPROVING"}; // loss narrowing
  if(a>0 && b<0)  return {gr:-99, sig:"DETERIORATING"};
  const gr=(b-a)/Math.abs(a)*100;
  let sig="NORMAL";
  if(gr>=10) sig="IMPROVING"; else if(gr<=-10) sig="DETERIORATING";
  return {gr,sig};
}

  o.epsgr12 = e12.gr; o.sig12 = e12.sig;

    o.interest_coverage = r.ebit_mil/(r.ebit_mil-r.pretax_mil);   // fallback

  // P/S TTM (analysis view)
  o.ps = (o.mktcap_bil!=null && rev) ? o.mktcap_bil/rev : null;
  return o;
}

// Best-effort EDGAR enrichment for live Zacks rows: pull latest-year metrics
// from the existing `financials` table for the tickers we have.
async function enrichWithEdgar(zrows){
  const need = ["RevenueFromContractWithCustomerExcludingAssessedTax","Revenues",
    "LongTermDebt","LongTermDebtNoncurrent","InterestExpense",
    "NetCashProvidedByUsedInOperatingActivities","OperatingIncomeLoss","EBITDA",
    "IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest"];
  const byTicker = {};
  try{
    const q = `${REST}/financials?select=ticker,metric,value,fiscal_year&metric=in.(${need.join(",")})`;
    const r = await fetch(q, {headers:HEADERS});
    if(r.ok){
      const fin = await r.json();
      // keep latest fiscal_year per ticker+metric
      const latest={};
      for(const f of fin){
        const k=f.ticker+"|"+f.metric;
        if(!latest[k]||f.fiscal_year>latest[k].fiscal_year) latest[k]=f;
      }
      for(const k in latest){
        const f=latest[k]; (byTicker[f.ticker]=byTicker[f.ticker]||{})[f.metric]=f.value;
      }
    }
  }catch(e){}
  const pick=(m,keys)=>{ for(const k of keys) if(m[k]!=null) return m[k]; return null; };
  return zrows.map(z=>{
    const m = byTicker[z.ticker]||{};
    const rev = pick(m,["RevenueFromContractWithCustomerExcludingAssessedTax","Revenues"]);
    const ebit = pick(m,["OperatingIncomeLoss"]);
    return Object.assign({}, z, {
      edgar_revenue_bil: rev!=null? rev/1e9 : null,
      edgar_lt_debt_bil: (()=>{const d=pick(m,["LongTermDebt","LongTermDebtNoncurrent"]); return d!=null?d/1e9:null;})(),
      edgar_interest_expense_bil: (()=>{const d=m.InterestExpense; return d!=null?d/1e9:null;})(),
      edgar_operating_cf_bil: (()=>{const d=m.NetCashProvidedByUsedInOperatingActivities; return d!=null?d/1e9:null;})(),
      ebit_mil: ebit!=null? ebit/1e6 : null,
      pretax_mil: (()=>{const d=m.IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest; return d!=null?d/1e6:null;})(),
    });
  });
}

function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

function synthesize(){
  const rnd = mulberry32(12345);
  const rows=[]; const used=new Set();
  const L="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  function tk(){ let t; do{ let n=3+(rnd()<0.3?1:0); t=""; for(let i=0;i<n;i++) t+=L[Math.floor(rnd()*26)]; }while(used.has(t)); used.add(t); return t; }
  const exch=["NYSE","NASDAQ","NYSE","NASDAQ","AMEX"];
  for(const [sector,count] of Object.entries(SECTOR_DIST)){
    const subs=SUBIND[sector];
    for(let i=0;i<count;i++){
      const ticker=tk();
      const sub=subs[Math.floor(rnd()*subs.length)];
      // market cap ($mil): log-uniform 50 .. 2,500,000
      const mc = Math.exp(rnd()*(Math.log(2500000)-Math.log(50))+Math.log(50));
      const rev_bil = Math.max(0.02, mc/1000 / (0.5+rnd()*4));     // P/S ~ 0.5..4
      const npm = 0.02+rnd()*0.22;                                  // net margin
      const ni = rev_bil*npm;                                       // $bil
      const sh = mc/1000 / (5+rnd()*40);                            // shares (bil), price implied
      let f0 = ni*1000/ (sh*1000);                                  // EPS ($) ~ ni/shares
      // introduce some losses
      if(rnd()<0.12) f0 = -Math.abs(f0)*(0.3+rnd());
      const g1 = (rnd()-0.35)*0.5;                                  // f0->f1 growth
      let f1 = f0>=0 ? f0*(1+g1) : f0*(1-g1*0.6);
      if(f0<0 && rnd()<0.4) f1 = Math.abs(f0)*(0.2+rnd()*0.8);      // some turnarounds
      const f2 = f1*(1+(rnd()-0.3)*0.4);
      const salesG = (rnd()-0.3)*0.35;
      const f1_sales_mil = rev_bil*1000*(1+salesG);
      const ebitdaMargin = 0.05+rnd()*0.35;
      const ebitda_mil = rev_bil*1000*ebitdaMargin;
      const ebit_mil = ebitda_mil*(0.5+rnd()*0.4);
      const noDebt = rnd()<0.10;
      const lt_debt_bil = noDebt?0: rev_bil*(0.1+rnd()*1.2);
      const int_exp_bil = noDebt?0: lt_debt_bil*(0.03+rnd()*0.05);
      const pretax_mil = ebit_mil - int_exp_bil*1000 + (rnd()-0.5)*ebit_mil*0.1;
      const ocf_bil = ni*(0.8+rnd()*0.9);
      const pe = f1>0 ? Math.max(3, (mc/1000)/(f1*sh)) : (rnd()<0.5?null:5+rnd()*60);
      rows.push({
        ticker, company_name: companyName(ticker,sector,rnd), exchange:exch[Math.floor(rnd()*exch.length)],
        sector, industry:sub, market_cap_mil:mc,
        pe_trailing_12_months: pe==null?null:+pe.toFixed(2),
        peg_ratio:null,
        f0_consensus_est:+f0.toFixed(2), f1_consensus_est:+f1.toFixed(2), f2_consensus_est:+f2.toFixed(2),
        f1_consensus_sales_est_mil:+f1_sales_mil.toFixed(1), ebitda_mil:+ebitda_mil.toFixed(1),
        quick_ratio:+(0.5+rnd()*2.5).toFixed(2), debt_total_capital:+(noDebt?0:(rnd()*0.7)).toFixed(2),
        eps_growth_q1_vs_q1:+((rnd()-0.3)*40).toFixed(1),
        // EDGAR-derived
        edgar_revenue_bil:+rev_bil.toFixed(3),
        edgar_lt_debt_bil:+lt_debt_bil.toFixed(3),
        edgar_interest_expense_bil: int_exp_bil? +int_exp_bil.toFixed(4):(noDebt?0:null),
        edgar_operating_cf_bil:+ocf_bil.toFixed(3),
        ebit_mil:+ebit_mil.toFixed(1), pretax_mil:+pretax_mil.toFixed(1),
      });
    }
  }
  return rows;
}

function computeSectorAverages(){
  const acc={};
  for(const r of DATA){
    const s=r.sector; if(!acc[s]) acc[s]={eps:[],ebitda:[],sales:[],pe:[]};
    if(r.epsgr01!=null && Math.abs(r.epsgr01)<99) acc[s].eps.push(r.epsgr01);
    if(r.ebitda_margin!=null) acc[s].ebitda.push(r.ebitda_margin);
    if(r.salesgr!=null) acc[s].sales.push(r.salesgr);
    if(r.pe_ttm!=null) acc[s].pe.push(r.pe_ttm);
  }
  SECTOR_AVG={};
  for(const s in acc) SECTOR_AVG[s]={
    eps:mean(acc[s].eps), ebitda:mean(acc[s].ebitda), sales:mean(acc[s].sales), pe:mean(acc[s].pe)
  };
}
function mean(a){ return a.length? a.reduce((x,y)=>x+y,0)/a.length : null; }
function median(a){ if(!a.length)return null; const s=[...a].sort((x,y)=>x-y); const m=s.length>>1; return s.length%2?s[m]:(s[m-1]+s[m])/2; }
function std(a){ if(a.length<2)return null; const m=mean(a); return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/(a.length-1)); }
function pctile(sorted,v){ // percentile rank of v within sorted asc
  let lo=0,hi=sorted.length; while(lo<hi){const mid=(lo+hi)>>1; if(sorted[mid]<v)lo=mid+1;else hi=mid;} return Math.round(lo/sorted.length*100); }

function passesFilters(r, exceptCol){
  // sector
  if(filters.sector && r.sector!==filters.sector) return false;
  if(filters.subs.size && !filters.subs.has(r.industry)) return false;
  // market cap
  if(filters.capMin!=null && (r.mktcap_bil==null || r.mktcap_bil<filters.capMin)) return false;
  if(filters.capMax!=null && (r.mktcap_bil==null || r.mktcap_bil>filters.capMax)) return false;
  // eps signal
  if(filters.signals.size && !filters.signals.has(r.sig01)) return false;
  // above-sector-average toggles
  const av=SECTOR_AVG[r.sector]||{};
  if(filters.aboveEps && !(r.epsgr01!=null && Math.abs(r.epsgr01)<99 && av.eps!=null && r.epsgr01>av.eps)) return false;
  if(filters.aboveEbitda && !(r.ebitda_margin!=null && av.ebitda!=null && r.ebitda_margin>av.ebitda)) return false;
  if(filters.aboveSales && !(r.salesgr!=null && av.sales!=null && r.salesgr>av.sales)) return false;
  if(filters.belowPe && !(r.pe_ttm!=null && av.pe!=null && r.pe_ttm<av.pe)) return false;
  // preset special: no LT debt
  if(filters.preset==="nodebt" && !(r.edgar_lt_debt_bil===0 || r.edgar_lt_debt_bil==null)) return false;
  // per-column excel filters
  for(const key in colFilters){
    if(key===exceptCol) continue;
    const cf=colFilters[key]; const col=COLS.find(c=>c.key===key);
    const dv=col.disp(r);
    // condition
    if(cf.cond && col.type==="num"){ if(!evalCond(dv, cf.cond)) return false; }
    // value checkboxes
    if(cf.excluded && cf.excluded.size){
      const s = dv==null?null:(col.type==="num"?dispStr(col,dv):String(dv));
      if(s==null){ if(cf.excluded.has("(Blanks)")) return false; }
      else if(cf.excluded.has(s)) return false;
    } else if(cf.blanks===false && (dv==null)) {
      return false;
    }
  }
  return true;
}
function evalCond(v, cond){
  if(v==null) return false;
  const m=cond.trim().match(/^(>=|<=|!=|=|>|<)?\s*(-?\d+\.?\d*)/);
  if(!m) return true;
  const op=m[1]||">", n=parseFloat(m[2]);
  switch(op){case">":return v>n;case"<":return v<n;case">=":return v>=n;case"<=":return v<=n;
    case"=":return Math.abs(v-n)<1e-9;case"!=":return Math.abs(v-n)>=1e-9;} return true;
}
function dispStr(col,dv){ // string of a displayed numeric value for checkbox matching
  if(col.unit==="%") return dv.toFixed(1);
  if(col.unit==="$") return dv.toFixed(2);
  return dv.toFixed(2);
}
function getFiltered(){
  let out=DATA.filter(r=>passesFilters(r,null));
  if(sortKey){
    const col=COLS.find(c=>c.key===sortKey);
    out.sort((a,b)=>{
      let x=col.disp(a), y=col.disp(b);
      if(x==null&&y==null)return 0; if(x==null)return 1; if(y==null)return -1;
      if(typeof x==="string") return x.localeCompare(y)*sortDir;
      return (x-y)*sortDir;
    });
  }
  return out;
}

function renderChips(){

// ---- table ----
function renderTable(){
  const cols=COLS.filter(c=>visibleCols.has(c.key));
  const wrap=document.getElementById("viewWrap");
  document.getElementById("pager").style.display="flex";
  // percentile precompute
  let pctData={};
  if(pctOn) for(const c of NUM_METRICS){ pctData[c.key]=FILTERED.map(r=>c.disp(r)).filter(v=>v!=null).sort((a,b)=>a-b); }
  // heat ranges
  let heatR={};
  if(heatOn) for(const c of NUM_METRICS){ if(!c.heat)continue; const vs=FILTERED.map(r=>c.disp(r)).filter(v=>v!=null); heatR[c.key]=[Math.min(...vs),Math.max(...vs)]; }

  const totalPages=Math.max(1,Math.ceil(FILTERED.length/perPage));
  if(page>=totalPages)page=totalPages-1; if(page<0)page=0;
  const start=page*perPage, slice=FILTERED.slice(start,start+perPage);

  let html=`<table class="grid"><thead><tr><th class="l"><input type="checkbox" id="selAll"></th>`;
  for(const c of cols){
    const active=colFilters[c.key]?"on":"";
    html+=`<th class="${c.left?'l':''}"><div class="th-in">
      <span class="lbl" data-sort="${c.key}">${c.label}</span>
      ${c.type!=='text'||c.key==='sector'||c.key==='sig01'||c.key==='sig12'?
        `<span class="fbtn ${active}" data-filt="${c.key}">▾</span>`:''}
      </div></th>`;
  }
  html+=`</tr></thead><tbody>`;
  for(const r of slice){
    html+=`<tr><td class="l"><input type="checkbox" class="rowchk" data-tk="${r.ticker}"></td>`;
    for(const c of cols){
      let cell=c.fmt(r);
      let style="";
      const dv=c.disp(r);
      if(heatOn && c.heat && dv!=null && heatR[c.key]){
        const [mn,mx]=heatR[c.key]; const t=mx>mn?(dv-mn)/(mx-mn):0.5;
        const base=c.heat==="green"?[22,163,74]:[220,38,38];
        const alpha=0.08+t*0.5; style=`background:rgba(${base[0]},${base[1]},${base[2]},${alpha.toFixed(2)})`;
      }
      let pill="";
      if(pctOn && c.type==="num" && dv!=null && pctData[c.key] && pctData[c.key].length){
        pill=`<span class="pctpill">${pctile(pctData[c.key],dv)}th</span>`;
      }
      html+=`<td class="${c.left?'l':''} ${c.key==='ticker'?'tk':''}" style="${style}">${cell}${pill}</td>`;
    }
    html+=`</tr>`;
  }
  html+=`</tbody></table>`;
  wrap.innerHTML=html;

  // pager
  const end=Math.min(start+perPage,FILTERED.length);
  document.getElementById("pageInfo").textContent=`${FILTERED.length?start+1:0}–${end} of ${FILTERED.length.toLocaleString()}`;

  // wire header
  wrap.querySelectorAll(".lbl").forEach(el=>el.onclick=()=>{
    const k=el.dataset.sort; if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=1;} refresh();
  });
  wrap.querySelectorAll(".fbtn").forEach(el=>el.onclick=(e)=>{e.stopPropagation();openXFilter(el.dataset.filt,el);});
  wrap.querySelectorAll(".lbl").forEach(el=>el.ondblclick=()=>showStats(el.dataset.sort));
  wrap.querySelectorAll(".tk-lnk").forEach(el=>el.onclick=()=>openPeek(el.dataset.tk));
  wrap.querySelectorAll(".lbl[data-sort]").forEach(el=>{
    const col=COLS.find(c=>c.key===el.dataset.sort);
    if(col&&col.type==="num") el.title="Double-click for column stats";
  });
}

// ---- excel filter dropdown ----
let xfCol=null;
function openXFilter(key, anchor){
  xfCol=key; const col=COLS.find(c=>c.key===key);
  const cf=colFilters[key]||{sort:null,cond:"",excluded:new Set(),blanks:true};
  // unique displayed values within set filtered by everything EXCEPT this column
  const base=DATA.filter(r=>passesFilters(r,key));
  const uniq=new Map(); let hasBlank=false;
  for(const r of base){ const dv=col.disp(r); if(dv==null){hasBlank=true;continue;}
    const s=col.type==="num"?dispStr(col,dv):String(dv); if(!uniq.has(s))uniq.set(s,0); uniq.set(s,uniq.get(s)+1); }
  let vals=[...uniq.keys()];
  if(col.type==="num") vals.sort((a,b)=>parseFloat(a)-parseFloat(b)); else vals.sort();
  const capped=vals.length>400; if(capped)vals=vals.slice(0,400);

  const unit=col.unit==="%"?"%":col.unit==="$"?"$B":"";
  const hint = col.type==="num" ? `e.g. > ${col.unit==='%'?'5 means > 5%':col.unit==='$'?'10 means > $10B':'20'}` : "";
  const xf=document.getElementById("xfilter");
  xf.innerHTML=`
    <div class="sortrow">
      <button class="btn" data-x="asc">Sort A→Z</button>
      <button class="btn" data-x="desc">Sort Z→A</button>
    </div>
    ${col.type==="num"?`<input class="cond" id="xcond" placeholder="e.g. > 20, <= 50, = 15" value="${cf.cond||''}">
      <div class="hint">${hint}</div>`:""}
    <input class="srch" id="xsrch" placeholder="Search…">
    <div class="vals" id="xvals">
      <label><input type="checkbox" id="xall" checked> <b>(Select All)</b></label>
      ${vals.map(v=>`<label><input type="checkbox" class="xv" value="${esc(v)}" ${cf.excluded&&cf.excluded.has(v)?'':'checked'}> ${esc(v)}${col.unit==='%'?'%':''}</label>`).join("")}
      ${hasBlank?`<label><input type="checkbox" class="xv" value="(Blanks)" ${cf.excluded&&cf.excluded.has("(Blanks)")?'':'checked'}> <i>(Blanks)</i></label>`:""}
    </div>
    ${capped?`<div class="hint">Showing first 400 values — use the condition box to narrow.</div>`:""}
    <div class="foot"><button class="btn" data-x="clear">Clear</button><button class="btn navy" data-x="ok">OK</button></div>`;
  const rect=anchor.getBoundingClientRect();
  xf.style.display="block";
  xf.style.left=Math.min(rect.left, window.innerWidth-272)+"px";
  xf.style.top=(rect.bottom+4)+"px";

  xf.querySelector("#xsrch").oninput=e=>{
    const q=e.target.value.toLowerCase();
    xf.querySelectorAll("#xvals label").forEach((l,i)=>{ if(i===0)return; l.style.display=l.textContent.toLowerCase().includes(q)?"flex":"none"; });
  };
  xf.querySelector("#xall").onclick=e=>{ xf.querySelectorAll(".xv").forEach(c=>{ if(c.closest("label").style.display!=="none")c.checked=e.target.checked; }); };
  xf.querySelectorAll("[data-x]").forEach(b=>b.onclick=()=>{
    const a=b.dataset.x;
    if(a==="asc"||a==="desc"){ sortKey=key; sortDir=a==="asc"?1:-1; closeXF(); refresh(); return; }
    if(a==="clear"){ delete colFilters[key]; closeXF(); refresh(); return; }
    if(a==="ok"){
      const cond=col.type==="num"?(xf.querySelector("#xcond").value.trim()):"";
      const excluded=new Set();
      xf.querySelectorAll(".xv").forEach(c=>{ if(!c.checked)excluded.add(c.value); });
      if(!cond && excluded.size===0){ delete colFilters[key]; }
      else colFilters[key]={sort:null,cond,excluded,blanks:true};
      closeXF(); refresh();
    }
  });
}

let scatterPts=[];
function drawScatter(){
  const cv=document.getElementById("scatter"); if(!cv)return;
  const W=cv.width=cv.clientWidth||1000, H=cv.height;
  const ctx=cv.getContext("2d"); ctx.clearRect(0,0,W,H);
  const cx=COLS.find(c=>c.key===scX), cy=COLS.find(c=>c.key===scY);
  const pad={l:60,r:20,t:20,b:44};
  const pts=FILTERED.map(r=>({x:cx.disp(r),y:cy.disp(r),r,mc:r.mktcap_bil})).filter(p=>p.x!=null&&p.y!=null&&isFinite(p.x)&&isFinite(p.y));
  if(!pts.length){ ctx.fillStyle="#6b7280"; ctx.fillText("No data",W/2,H/2); return; }
  const xmin=Math.min(...pts.map(p=>p.x)),xmax=Math.max(...pts.map(p=>p.x));
  const ymin=Math.min(...pts.map(p=>p.y)),ymax=Math.max(...pts.map(p=>p.y));
  const sx=v=>pad.l+(v-xmin)/((xmax-xmin)||1)*(W-pad.l-pad.r);
  const sy=v=>H-pad.b-(v-ymin)/((ymax-ymin)||1)*(H-pad.t-pad.b);
  // axes
  ctx.strokeStyle="#e5e7eb"; ctx.fillStyle="#6b7280"; ctx.font="11px Inter,system-ui"; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  for(let i=0;i<=5;i++){ const gx=pad.l+i/5*(W-pad.l-pad.r); const v=xmin+i/5*(xmax-xmin);
    ctx.fillText(fmtAxis(cx,v),gx-10,H-pad.b+16);
    const gy=H-pad.b-i/5*(H-pad.t-pad.b); const vy=ymin+i/5*(ymax-ymin);
    ctx.fillText(fmtAxis(cy,vy),6,gy+3); }
  ctx.save();ctx.translate(16,H/2);ctx.rotate(-Math.PI/2);ctx.fillText(cy.label,0,0);ctx.restore();
  ctx.fillText(cx.label,W/2,H-6);
  const mcMax=Math.max(...pts.map(p=>p.mc||1));
  scatterPts=[];
  for(const p of pts){
    const X=sx(p.x),Y=sy(p.y); const rad=3+Math.sqrt((p.mc||1)/mcMax)*11;
    ctx.beginPath();ctx.fillStyle=(SECTOR_COLORS[p.r.sector]||"#888")+"cc";ctx.arc(X,Y,rad,0,7);ctx.fill();
    scatterPts.push({X,Y,rad,r:p.r,x:p.x,y:p.y});
  }
  if(scCross){ const mx=mean(pts.map(p=>p.x)),my=mean(pts.map(p=>p.y));
    ctx.strokeStyle="#1d4ed8";ctx.setLineDash([5,4]);ctx.beginPath();
    ctx.moveTo(sx(mx),pad.t);ctx.lineTo(sx(mx),H-pad.b);ctx.moveTo(pad.l,sy(my));ctx.lineTo(W-pad.r,sy(my));ctx.stroke();ctx.setLineDash([]); }
  if(scTrend){ const {m,b}=linreg(pts); ctx.strokeStyle="#dc2626";ctx.lineWidth=2;ctx.beginPath();
    ctx.moveTo(sx(xmin),sy(m*xmin+b));ctx.lineTo(sx(xmax),sy(m*xmax+b));ctx.stroke();ctx.lineWidth=1; }
}
function fmtAxis(c,v){ if(c.unit==="%")return v.toFixed(0)+"%"; if(c.unit==="$")return "$"+v.toFixed(0); return v.toFixed(1); }
function linreg(pts){ const n=pts.length; let sx=0,sy=0,sxy=0,sxx=0; for(const p of pts){sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sxx+=p.x*p.x;} const m=(n*sxy-sx*sy)/((n*sxx-sx*sx)||1); return {m,b:(sy-m*sx)/n}; }
// scatter hover
document.getElementById("viewWrap").addEventListener("mousemove",e=>{
  if(view!=="scatter")return; const cv=document.getElementById("scatter"); if(!cv)return;
  const rect=cv.getBoundingClientRect(); const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const hit=scatterPts.find(p=>Math.hypot(p.X-mx,p.Y-my)<=p.rad+1);
  const tip=document.getElementById("plotTip");
  if(hit){ const cx=COLS.find(c=>c.key===scX),cy=COLS.find(c=>c.key===scY);
    tip.innerHTML=`<b>${hit.r.ticker}</b> ${esc(hit.r.company_name)}<br>${cx.label}: ${fmtAxis(cx,hit.x)}<br>${cy.label}: ${fmtAxis(cy,hit.y)}<br>Mkt Cap: ${fmtB(hit.r.mktcap_bil)}B`;
    tip.style.display="block"; tip.style.left=(e.clientX+12)+"px"; tip.style.top=(e.clientY+12)+"px"; }
  else tip.style.display="none";
});

        <table><thead><tr><th class="l">Ticker</th><th>SG%</th><th>EG%</th><th>PS</th><th>PEG</th><th>EBITDA%</th></tr></thead>
        <tbody>
          <tr class="avg"><td class="l">AVG</td><td>${avg.sg==null?"—":(avg.sg*100).toFixed(1)}</td><td>${avg.eg==null?"—":avg.eg.toFixed(1)}</td><td>${avg.ps==null?"—":avg.ps.toFixed(2)}</td><td>${avg.peg==null?"—":avg.peg.toFixed(2)}</td><td>${avg.em==null?"—":avg.em.toFixed(1)}</td></tr>
          <tr class="med"><td class="l">MED</td><td>${med.sg==null?"—":(med.sg*100).toFixed(1)}</td><td>${med.eg==null?"—":med.eg.toFixed(1)}</td><td>${med.ps==null?"—":med.ps.toFixed(2)}</td><td>${med.peg==null?"—":med.peg.toFixed(2)}</td><td>${med.em==null?"—":med.em.toFixed(1)}</td></tr>
          ${body}
        </tbody></table>
      </div>
    </div>`;
  const axs=document.getElementById("anaX"),ays=document.getElementById("anaY");
  axs.value=anaX;ays.value=anaY;
  axs.onchange=()=>{anaX=axs.value;drawAna();};
  ays.onchange=()=>{anaY=ays.value;drawAna();};
  document.getElementById("anaTrend").onchange=drawAna;
  document.getElementById("anaCross").onchange=drawAna;
  document.querySelectorAll(".ana-right .tk-lnk").forEach(el=>el.onclick=()=>openPeek(el.dataset.tk));
  drawAna();
}
function drawAna(){
  const cv=document.getElementById("anaCanvas"); if(!cv)return;
  const W=cv.width=cv.clientWidth||900,H=cv.height; const ctx=cv.getContext("2d");ctx.clearRect(0,0,W,H);
  const cx=COLS.find(c=>c.key===anaX),cy=COLS.find(c=>c.key===anaY);
  const pad={l:56,r:16,t:16,b:40};
  const pts=FILTERED.map(r=>({x:cx.disp(r),y:cy.disp(r),r})).filter(p=>p.x!=null&&p.y!=null&&isFinite(p.x)&&isFinite(p.y));
  if(!pts.length)return;
  const xmin=Math.min(...pts.map(p=>p.x)),xmax=Math.max(...pts.map(p=>p.x));
  const ymin=Math.min(...pts.map(p=>p.y)),ymax=Math.max(...pts.map(p=>p.y));
  const sx=v=>pad.l+(v-xmin)/((xmax-xmin)||1)*(W-pad.l-pad.r);
  const sy=v=>H-pad.b-(v-ymin)/((ymax-ymin)||1)*(H-pad.t-pad.b);
  ctx.strokeStyle="#e5e7eb";ctx.fillStyle="#6b7280";ctx.font="10px Inter,system-ui";
  ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
  ctx.fillText(cx.label,W/2-20,H-4);ctx.save();ctx.translate(14,H/2);ctx.rotate(-Math.PI/2);ctx.fillText(cy.label,0,0);ctx.restore();
  const showLbl=pts.length<=120;
  for(const p of pts){ const X=sx(p.x),Y=sy(p.y);
    ctx.beginPath();ctx.fillStyle="#1d4ed8";ctx.arc(X,Y,3.5,0,7);ctx.fill();
    if(showLbl){ctx.fillStyle="#374151";ctx.fillText(p.r.ticker,X+5,Y-4);} }
  if(document.getElementById("anaCross")&&document.getElementById("anaCross").checked){
    const mx=mean(pts.map(p=>p.x)),my=mean(pts.map(p=>p.y));
    ctx.strokeStyle="#1d4ed8";ctx.setLineDash([5,4]);ctx.beginPath();
    ctx.moveTo(sx(mx),pad.t);ctx.lineTo(sx(mx),H-pad.b);ctx.moveTo(pad.l,sy(my));ctx.lineTo(W-pad.r,sy(my));ctx.stroke();ctx.setLineDash([]); }
  if(document.getElementById("anaTrend")&&document.getElementById("anaTrend").checked){
    const {m,b}=linreg(pts);ctx.strokeStyle="#dc2626";ctx.lineWidth=2;ctx.beginPath();
    ctx.moveTo(sx(xmin),sy(m*xmin+b));ctx.lineTo(sx(xmax),sy(m*xmax+b));ctx.stroke();ctx.lineWidth=1; }
}

// ============================================================================
//  PEEK PANEL
// ============================================================================
function openPeek(tk){
  const r=DATA.find(d=>d.ticker===tk); if(!r)return;
  document.getElementById("pkTk").textContent=r.ticker;
  document.getElementById("pkNm").textContent=r.company_name+" · "+r.sector;
  const cells=[
    ["Market Cap",fmtB(r.mktcap_bil)+"B"],["P/E TTM",fmt2(r.pe_ttm)],
    ["EPS Signal",badge(r.sig01)],["EPS Gr F0→F1",fmtEps(r.epsgr01)],
    ["Sales Growth",fmtPct(r.salesgr)],["EBITDA Margin",fmt1p(r.ebitda_margin)],
  ];
  document.getElementById("pkGrid").innerHTML=cells.map(c=>`<div class="pg"><div class="k">${c[0]}</div><div class="val">${c[1]}</div></div>`).join("");
  document.getElementById("pkProfile").onclick=()=>{ window.location.href=`dashboard.html#${r.ticker}`; };
  document.getElementById("peek").classList.add("open");
}
document.getElementById("peekClose").onclick=()=>document.getElementById("peek").classList.remove("open");

// ============================================================================
//  SIDEBAR BUILDERS + EVENTS
// ============================================================================
function buildSectors(){
  const counts={}; for(const r of DATA) counts[r.sector]=(counts[r.sector]||0)+1;
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  document.getElementById("sectorGrid").innerHTML=entries.map(([s,n])=>
    `<button class="sec-tile ${filters.sector===s?'active':''}" data-sec="${esc(s)}">
      <span class="sn">${esc(s)}</span><span class="sc">${n}</span></button>`).join("");
  document.querySelectorAll("#sectorGrid .sec-tile").forEach(el=>el.onclick=()=>{
    const s=el.dataset.sec;
    if(filters.sector===s){filters.sector=null;filters.subs.clear();}
    else{filters.sector=s;filters.subs.clear();}
    buildSectors(); buildSubInd(); refresh();
  });
  buildSubInd();
}
function buildSubInd(){
  const box=document.getElementById("subInd");
  if(!filters.sector){box.style.display="none";return;}
  const counts={}; for(const r of DATA) if(r.sector===filters.sector) counts[r.industry]=(counts[r.industry]||0)+1;
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  box.style.display="block";
  box.innerHTML=entries.map(([i,n])=>
    `<label><input type="checkbox" class="subchk" value="${esc(i)}" ${filters.subs.has(i)?'checked':''}>
      ${esc(i)}<span class="sc">${n}</span></label>`).join("");
  box.querySelectorAll(".subchk").forEach(c=>c.onchange=()=>{
    if(c.checked)filters.subs.add(c.value); else filters.subs.delete(c.value); refresh();
  });
}
function buildPills(){
  const all=["ALL",...SIGNALS];
  document.getElementById("sigPills").innerHTML=all.map(s=>{
    const on = s==="ALL" ? filters.signals.size===0 : filters.signals.has(s);
    return `<span class="pill ${on?'on':''}" data-sig="${s}" title="${SIG_DESC[s]}">${s==="ALL"?"ALL":s.slice(0,4)}</span>`;
  }).join("");
  document.querySelectorAll("#sigPills .pill").forEach(el=>el.onclick=()=>{
    const s=el.dataset.sig;
    if(s==="ALL")filters.signals.clear();
    else{ if(filters.signals.has(s))filters.signals.delete(s); else filters.signals.add(s); }
    buildPills(); refresh();
  });
}
function initCapSlider(){
  const vals=DATA.map(r=>r.mktcap_bil).filter(v=>v!=null&&v>0);
  capBounds.min=Math.min(...vals); capBounds.max=Math.max(...vals);
  capBounds.lnMin=Math.log(capBounds.min); capBounds.lnMax=Math.log(capBounds.max);
  const mn=document.getElementById("capMin"),mx=document.getElementById("capMax");
  // reflect current filter into slider positions
  mn.value = filters.capMin!=null ? valToSlider(filters.capMin) : 0;
  mx.value = filters.capMax!=null ? valToSlider(filters.capMax) : 100;
  updateCapUI();
}
function sliderToVal(s){ return Math.exp(capBounds.lnMin+(s/100)*(capBounds.lnMax-capBounds.lnMin)); }
function valToSlider(v){ return (Math.log(v)-capBounds.lnMin)/(capBounds.lnMax-capBounds.lnMin)*100; }
function updateCapUI(){
  const mn=+document.getElementById("capMin").value, mx=+document.getElementById("capMax").value;
  const vmin=sliderToVal(mn), vmax=sliderToVal(mx);
  document.getElementById("capLabel").textContent=`${fmtCap(vmin)} — ${fmtCap(vmax)}`;
  const fill=document.getElementById("capFill"); fill.style.left=mn+"%"; fill.style.width=(mx-mn)+"%";
}
["capMin","capMax"].forEach(id=>{
  document.getElementById(id).addEventListener("input",()=>{
    let mn=+document.getElementById("capMin").value, mx=+document.getElementById("capMax").value;
    if(mn>mx){ if(id==="capMin")document.getElementById("capMin").value=mx; else document.getElementById("capMax").value=mn; }
    updateCapUI();
  });
  document.getElementById(id).addEventListener("change",()=>{
    const mn=+document.getElementById("capMin").value, mx=+document.getElementById("capMax").value;
    filters.capMin = mn>0 ? sliderToVal(mn) : null;
    filters.capMax = mx<100 ? sliderToVal(mx) : null;
    refresh();
  });
});
function tglAvg(k){
  const map={eps:"aboveEps",ebitda:"aboveEbitda",sales:"aboveSales",pe:"belowPe"};
  filters[map[k]]=!filters[map[k]];
  document.querySelector(`.sw[data-avg="${k}"]`).classList.toggle("on",filters[map[k]]);
  refresh();
}
document.querySelectorAll(".sw[data-avg]").forEach(sw=>sw.onclick=()=>tglAvg(sw.dataset.avg));
function renderAvgLabels(){
  const overall={eps:mean(Object.values(SECTOR_AVG).map(s=>s.eps).filter(v=>v!=null)),
    ebitda:mean(Object.values(SECTOR_AVG).map(s=>s.ebitda).filter(v=>v!=null)),
    sales:mean(Object.values(SECTOR_AVG).map(s=>s.sales).filter(v=>v!=null)),
    pe:mean(Object.values(SECTOR_AVG).map(s=>s.pe).filter(v=>v!=null))};
  document.getElementById("avgEps").textContent=overall.eps!=null?overall.eps.toFixed(1)+"%":"";
  document.getElementById("avgEbitda").textContent=overall.ebitda!=null?overall.ebitda.toFixed(1)+"%":"";
  document.getElementById("avgSales").textContent=overall.sales!=null?(overall.sales*100).toFixed(1)+"%":"";
  document.getElementById("avgPe").textContent=overall.pe!=null?overall.pe.toFixed(1):"";
}

// ---- presets ----
function applyPreset(p){
  clearAllFilters(true);
  filters.preset=p;
  if(p==="quality"){ filters.signals.add("NORMAL"); filters.aboveEbitda=true; }
  else if(p==="growth"){ filters.aboveEps=true; filters.aboveSales=true; }
  else if(p==="turnaround"){ filters.signals.add("TURNAROUND"); filters.signals.add("IMPROVING"); }
  else if(p==="nodebt"){ /* handled in passesFilters */ }
  syncSidebar(); refresh();
  toast("Preset applied: "+p);
}
function clearPreset(){ filters.preset=null; document.querySelectorAll(".preset").forEach(b=>b.classList.remove("active")); }
document.querySelectorAll(".preset").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".preset").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); applyPreset(b.dataset.preset);
});

function clearAllFilters(silent){
  filters=defaultFilters(); colFilters={};
  document.querySelectorAll(".preset").forEach(b=>b.classList.remove("active"));
  syncSidebar();
  if(!silent){ refresh(); toast("Filters cleared"); }
}
document.getElementById("clearAll").onclick=()=>clearAllFilters();
function syncSidebar(){
  buildSectors(); buildSubInd(); buildPills(); initCapSlider();
  document.querySelectorAll(".sw[data-avg]").forEach(sw=>{
    const map={eps:"aboveEps",ebitda:"aboveEbitda",sales:"aboveSales",pe:"belowPe"};
    sw.classList.toggle("on",filters[map[sw.dataset.avg]]);
  });
}

// ---- saved screens (localStorage) ----
const LS_KEY="screener_saved_v1";
function loadSaved(){ try{return JSON.parse(localStorage.getItem(LS_KEY))||[];}catch(e){return[];} }
function renderSaved(){
  const list=loadSaved(); const el=document.getElementById("savedList");
  if(!list.length){ el.innerHTML=`<div class="saved-empty">No saved screens yet</div>`; return; }
  el.innerHTML=list.map((s,i)=>`<div class="saved-item" data-i="${i}">
    <span class="nm">${esc(s.name)}</span><span class="n">${s.count}</span><span class="del" data-del="${i}">×</span></div>`).join("");
  el.querySelectorAll(".saved-item").forEach(it=>it.onclick=e=>{
    if(e.target.dataset.del!==undefined)return; loadScreen(list[+it.dataset.i]);
  });
  el.querySelectorAll(".del").forEach(d=>d.onclick=e=>{
    e.stopPropagation(); const arr=loadSaved(); arr.splice(+d.dataset.del,1);
    localStorage.setItem(LS_KEY,JSON.stringify(arr)); renderSaved(); toast("Screen deleted");
  });
}
function serializeFilters(){
  return {sector:filters.sector,subs:[...filters.subs],capMin:filters.capMin,capMax:filters.capMax,
    signals:[...filters.signals],aboveEps:filters.aboveEps,aboveEbitda:filters.aboveEbitda,
    aboveSales:filters.aboveSales,belowPe:filters.belowPe,preset:filters.preset,
    colFilters:Object.fromEntries(Object.entries(colFilters).map(([k,v])=>[k,{cond:v.cond,excluded:[...(v.excluded||[])]}]))};
}
document.getElementById("saveBtn").onclick=()=>{
  const name=document.getElementById("saveName").value.trim(); if(!name){toast("Enter a name");return;}
  const arr=loadSaved(); arr.push({name,count:FILTERED.length,f:serializeFilters()});
  localStorage.setItem(LS_KEY,JSON.stringify(arr));
  document.getElementById("saveName").value=""; renderSaved(); toast("Screen saved: "+name);
};
function loadScreen(s){
  const f=s.f; filters=defaultFilters();
  filters.sector=f.sector; filters.subs=new Set(f.subs||[]);
  filters.capMin=f.capMin; filters.capMax=f.capMax; filters.signals=new Set(f.signals||[]);
  filters.aboveEps=f.aboveEps; filters.aboveEbitda=f.aboveEbitda; filters.aboveSales=f.aboveSales;
  filters.belowPe=f.belowPe; filters.preset=f.preset;
  colFilters={}; for(const k in (f.colFilters||{})) colFilters[k]={cond:f.colFilters[k].cond,excluded:new Set(f.colFilters[k].excluded),blanks:true};
  syncSidebar(); refresh(); toast("Loaded: "+s.name);
}

// ============================================================================
//  TOOLBAR EVENTS
// ============================================================================
document.getElementById("heatBtn").onclick=e=>{heatOn=!heatOn;e.target.classList.toggle("on",heatOn);renderTable();};
document.getElementById("pctBtn").onclick=e=>{pctOn=!pctOn;e.target.classList.toggle("on",pctOn);renderTable();};
document.getElementById("viewSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  view=b.dataset.view;
  document.querySelectorAll("#viewSeg button").forEach(x=>x.classList.toggle("on",x===b));
  refresh();
});
document.getElementById("applyBtn").onclick=()=>{ refresh(); toast(FILTERED.length.toLocaleString()+" companies match"); };
// columns menu
function buildColMenu(){
  document.getElementById("colMenu").innerHTML=COLS.filter(c=>c.key!=="ticker").map(c=>
    `<label><input type="checkbox" class="colchk" value="${c.key}" ${visibleCols.has(c.key)?'checked':''}>${c.label}</label>`).join("");
  document.querySelectorAll(".colchk").forEach(c=>c.onchange=()=>{
    if(c.checked)visibleCols.add(c.value); else visibleCols.delete(c.value); renderTable();
  });
}
document.getElementById("colBtn").onclick=e=>{e.stopPropagation();const m=document.getElementById("colMenu");m.style.display=m.style.display==="block"?"none":"block";};
document.addEventListener("click",e=>{ if(!e.target.closest("#colBtn")&&!e.target.closest("#colMenu"))document.getElementById("colMenu").style.display="none"; });
// export
document.getElementById("exportBtn").onclick=()=>{
  const cols=COLS.filter(c=>visibleCols.has(c.key));
  const head=cols.map(c=>c.label).join(",");
  const lines=FILTERED.map(r=>cols.map(c=>{
    let v; if(c.type==="num"){const d=c.disp(r);v=d==null?"":d.toFixed(4);}
    else v=(c.val?c.val(r):c.disp(r))||"";
    return /[",]/.test(v)?`"${String(v).replace(/"/g,'""')}"`:v;
  }).join(",")).join("\n");
  const blob=new Blob([head+"\n"+lines],{type:"text/csv"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="screener_export.csv"; a.click();
  toast("Exported "+FILTERED.length.toLocaleString()+" rows");
};
// pager
document.getElementById("perPage").onchange=e=>{perPage=+e.target.value;page=0;renderTable();};
document.getElementById("pgFirst").onclick=()=>{page=0;renderTable();};
document.getElementById("pgPrev").onclick=()=>{page--;renderTable();};
document.getElementById("pgNext").onclick=()=>{page++;renderTable();};
document.getElementById("pgLast").onclick=()=>{page=1e9;renderTable();};
// select all rows
document.getElementById("viewWrap").addEventListener("change",e=>{
  if(e.target.id==="selAll"){ document.querySelectorAll(".rowchk").forEach(c=>c.checked=e.target.checked); }
});

// toast + banner
let toastT;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }
function showBanner(msg){ const b=document.getElementById("dataBanner"); b.textContent=msg; b.style.display="block"; }

// ============================================================================
//  BOOT
// ============================================================================
function boot(){
  document.getElementById("loading")?.remove();
  buildSectors(); buildPills(); initCapSlider(); buildColMenu(); renderSaved(); renderAvgLabels();
  refresh();
}
loadData();
</script>
